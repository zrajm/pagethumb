<meta charset="utf-8">
<style>
  html { box-sizing: border-box; color-scheme: light dark }
  * { box-sizing: inherit; margin: 0; padding: 0; border-radius: 0 }
  body {
      background: field;
      color: fieldtext;
  }
  #menu {
      display: flex;
      padding: 2px 4px;
      align-items: center;
      justify-content: center;
  }
  #menu button {
      &:hover { background: #8886 }
      background: inherit; color: inherit;
      border: 0; border-radius: 4px;
      cursor: pointer;
      padding: 8px 10px;
  }
  #menu button img {
      display: block;
      width: 20px;
      height: 20px;
  }
</style>
<div id="menu">
  <button id="👍" title="Like page">
    <img src="pic/like-normal.svg">
  </button>
  <button id="👎" title="Dislike page">
    <img src="pic/dislike-normal.svg">
  </button>
  <button id="⭐" title="Bookmark page">
    <img src="pic/star-normal.svg">
  </button>
</div>
<script type="module" src="popup.js"></script>
